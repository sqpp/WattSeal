name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          Copy-Item target/release/wattseal.exe WattSeal-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: WattSeal-windows.exe

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev pkg-config \
            libx11-dev libxkbcommon-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libegl1-mesa-dev libvulkan-dev libwayland-dev \
            libxdo-dev

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          cp target/release/wattseal WattSeal-linux
          chmod +x WattSeal-linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: WattSeal-linux

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release
        run: cargo build --release

      - name: Package
        run: |
          cp target/release/wattseal WattSeal-macos
          chmod +x WattSeal-macos

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: WattSeal-macos

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            WattSeal-windows.exe
            WattSeal-linux
            WattSeal-macos
