[package]
name = "collector"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[build-dependencies]
winres = "0.1"

[target.'cfg(windows)'.dependencies]
win-kernel-driver = { git = "https://github.com/alex-dow/winRing0-rs" }
win_ring0 = { git = "https://github.com/alex-dow/winRing0-rs" }

[dependencies]
adlx = "0.0.0-alpha.1"
chrono = { version = "0.4.42", features = ["clock"] }
display-info = "0.5.7"
hardware-query = "0.2.1"
is-admin = "0.1.4"
memmap2 = "0.9.9"
nvml-wrapper = "0.11.0"
rusqlite = { version = "0.37.0", features = ["bundled", "chrono"] }
sysinfo = "0.37.2"
tray-icon = "0.21.2"
windows = { version = "0.57", features = [
    "Win32_Graphics_Dxgi",
    "Win32_Foundation"
] }
